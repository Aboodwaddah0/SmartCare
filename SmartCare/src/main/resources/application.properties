spring.application.name=SmartCare
server.port=8090

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/smartcare
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true


# MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/smartcare_db

# JWT
jwt.secret=bXlzdXBlcnNlY3JldGtleTEyMzQ1Njc4OTAxMjM0NTY3ODkw
jwt.expiration=604800000

#Ai-model-config
spring.ai.openai.api-key=sk-xxxxxxxxxxxxxxxx
spring.ai.openai.chat.options.model=gpt-4o-mini
spring.ai.anthropic.api-key=sk-ant-api03-placeholder


#Logging config
logging.level.root=INFO
logging.level.com.example.SmartCare=DEBUG
spring.jpa.properties.hibernate.generate_statistics=true
logging.level.org.hibernate.stat=DEBUG
logging.level.org.hibernate.cache=DEBUG
logging.file.name=logs/smartcare.log


# Enable Hibernate Second-Level Cache
spring.cache.jcache.config=classpath:ehcache.xml
spring.jpa.properties.hibernate.cache.use_second_level_cache=true
spring.jpa.properties.hibernate.cache.use_query_cache=true
spring.jpa.properties.hibernate.cache.region.factory_class=org.hibernate.cache.jcache.JCacheRegionFactory
